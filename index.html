<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <title>Tom Kor — Аналитик Неочевидного</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0d0d0d;               /* Глубокий чёрный */
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }

        .card {
            max-width: 360px;
            width: 100%;
            background: #1a1a1a;               /* Тёмно-серая карточка */
            border-radius: 20px;
            padding: 30px 20px 25px;
        }

        /* Аватар */
        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #c9a96e;        /* Золотистый акцент */
            margin-bottom: 18px;
            background: #2a2a2a;
        }

        /* Имя */
        .name {
            font-size: 24px;
            font-weight: 700;
            color: #f0f0f0;
            margin-bottom: 4px;
            letter-spacing: 0.3px;
        }

        /* Роль */
        .role {
            font-size: 15px;
            font-weight: 500;
            color: #c9a96e;                   /* Золотистый */
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        /* Резюме */
        .resume {
            text-align: left;
            font-size: 14px;
            line-height: 1.7;
            color: #cccccc;
            background: #222222;               /* Чуть светлее карточки */
            border-radius: 14px;
            padding: 18px 16px;
            margin-bottom: 0;
            border-left: 3px solid #c9a96e;   /* Золотая полоса слева */
        }

        .resume p {
            margin: 0 0 10px 0;
        }

        .resume p:last-child {
            margin-bottom: 0;
        }

        /* Эмодзи в резюме */
        .resume p::before {
            margin-right: 6px;
        }
    </style>
</head>
<body>

    <!-- Визитка (без проверки на Telegram, только сама карточка) -->
    <div class="card">
        <!-- Аватар: замените src на прямую ссылку вашего фото -->
        <img src="photo.jpg" alt="Tom Kor" class="avatar">

        <div class="name">Tom Kor</div>
        <div class="role">Аналитик Неочевидного</div>

        <!-- Резюме -->
        <div class="resume">
            <p>🔍 Нахожу скрытые закономерности там, где другие видят хаос.</p>
            <p>🧩 Разрабатываю нестандартные стратегии под сложные задачи.</p>
            <p>💡 Превращаю неочевидные инсайты в понятные решения.</p>
        </div>
    </div>

</body>
</html>
