<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <title>Tom Tot — Analyst of the Non-Obvious</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0d0d0d;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }

        .card {
            max-width: 360px;
            width: 100%;
            background: #1a1a1a;
            border-radius: 20px;
            padding: 30px 20px 25px;
        }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #c9a96e;
            margin-bottom: 18px;
            background: #2a2a2a;
        }

        .name {
            font-size: 24px;
            font-weight: 700;
            color: #f0f0f0;
            margin-bottom: 4px;
            letter-spacing: 0.3px;
        }

        .role {
            font-size: 15px;
            font-weight: 500;
            color: #c9a96e;
            margin-bottom: 16px;
            letter-spacing: 0.5px;
        }

        /* Переключатель языков — по центру под ролью */
        .lang-switch {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .lang-btn {
            background: #2a2a2a;
            border: 1px solid #444;
            color: #999;
            padding: 7px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .lang-btn.active {
            background: #c9a96e;
            color: #0d0d0d;
            border-color: #c9a96e;
            font-weight: 600;
        }

        .resume {
            text-align: left;
            font-size: 14px;
            line-height: 1.7;
            color: #cccccc;
            background: #222222;
            border-radius: 14px;
            padding: 18px 16px;
            margin-bottom: 0;
            border-left: 3px solid #c9a96e;
        }

        .resume p {
            margin: 0 0 10px 0;
        }

        .resume p:last-child {
            margin-bottom: 0;
        }

        .error-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0d0d0d;
            color: #f0f0f0;
            padding: 40vh 20px 0;
            text-align: center;
            z-index: 9999;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div id="tg-error" class="error-screen">📱<br>Please open this card via Telegram</div>

    <div id="main-content" class="card" style="display: none;">

        <img src="photo.jpg" alt="Tom Tot" class="avatar">
        <div class="name">Tom Tot</div>
        <div class="role" id="role-text">Analyst of the Non-Obvious</div>

        <!-- Кнопки языков по центру под ролью, EN первая -->
        <div class="lang-switch">
            <button class="lang-btn active" onclick="setLang('en')">🇬🇧 EN</button>
            <button class="lang-btn" onclick="setLang('ru')">🇷🇺 RU</button>
        </div>

        <div class="resume" id="resume-text">
            <p>🔍 Find hidden patterns where others see chaos.</p>
            <p>🧩 Develop non-standard strategies for complex challenges.</p>
            <p>💡 Turn non-obvious insights into clear solutions.</p>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        if (!window.Telegram?.WebApp) {
            document.getElementById('tg-error').style.display = 'block';
        } else {
            window.Telegram.WebApp.ready();
            document.getElementById('tg-error').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
        }

        const data = {
            en: {
                role: "Analyst of the Non-Obvious",
                resume: [
                    "🔍 Find hidden patterns where others see chaos.",
                    "🧩 Develop non-standard strategies for complex challenges.",
                    "💡 Turn non-obvious insights into clear solutions."
                ]
            },
            ru: {
                role: "Аналитик Неочевидного",
                resume: [
                    "🔍 Нахожу скрытые закономерности там, где другие видят хаос.",
                    "🧩 Разрабатываю нестандартные стратегии под сложные задачи.",
                    "💡 Превращаю неочевидные инсайты в понятные решения."
                ]
            }
        };

        function setLang(lang) {
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.includes(lang.toUpperCase())) {
                    btn.classList.add('active');
                }
            });

            document.getElementById('role-text').textContent = data[lang].role;

            const resumeDiv = document.getElementById('resume-text');
            resumeDiv.innerHTML = data[lang].resume.map(p => `<p>${p}</p>`).join('');
        }
    </script>

</body>
</html>
